<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Request Exercise</title>
</head>
<body>
    <h1>Ring Commission Form</h1>
    <h2>GET</h2>
        <form action="http://localhost:3000/rings">
        <input type="text" name="metal" id="metal">
        <input type="number" name="qty" id="qty">
        <button>Submit</button>
    </form>

    <h2>POST</h2>
    <form action="http://localhost:3000/rings" method="POST">
        <input type="text" name="metal" id="metal">
        <input type="number" name="qty" id="qty">
        <button>Submit</button>
    </form>
</body>
</html>
